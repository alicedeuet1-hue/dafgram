services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: dafgram
      POSTGRES_PASSWORD: dafgram
      POSTGRES_DB: dafgram
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    command: >
      sh -c "python -m app.scripts.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    env_file: .env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/store:/app/store
      - ./frontend/contexts:/app/contexts
    command: "npm run dev"

volumes:
  pgdata:
  uploads:
